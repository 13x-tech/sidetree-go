name: CI

on:
  push:
    branches: [master]
  pull_request:

permissions:
  contents: read

# All dependencies (the 13x-tech ion-sdk-go / go-jose forks and the rest) are
# public, so module download needs no token.
jobs:
  build-test:
    runs-on: ubuntu-latest
    steps:
      - uses: actions/checkout@v4

      - uses: actions/setup-go@v5
        with:
          go-version: stable
          cache: true

      - name: gofmt
        run: |
          unformatted="$(gofmt -l .)"
          if [ -n "$unformatted" ]; then
            echo "These files are not gofmt-clean:"; echo "$unformatted"; exit 1
          fi

      - name: go vet
        run: go vet ./...

      - name: build
        run: go build ./...

      - name: test (race detector + coverage)
        run: go test -race -count=1 -coverprofile=cover.out ./...

      - name: coverage summary
        run: go tool cover -func=cover.out | tail -1
